name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging

  release:
    types:
      - published

env:
  PYTHON_VERSION: "3.12"

jobs:

  build-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create Virtual Environment
        run: |
          python3 -m venv venv

      - name: Install Dependencies
        run: |
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Build Application
        run: |
          echo "Application Build Successful"
       - name: Create .env file
  run: |
    cat <<EOF > .env
    MONGO_URI=${{ secrets.MONGO_URI }}
    SECRET_KEY=${{ secrets.SECRET_KEY }}
    EOF

    cat .env
      - name: Run Unit Tests
        run: |
          source venv/bin/activate
          pytest

  deploy-staging:

    needs: build-test

    if: github.ref == 'refs/heads/staging'

    runs-on: ubuntu-latest

    environment:
      name: staging

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create Virtual Environment
        run: |
          python3 -m venv venv

      - name: Install Dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Configure Environment Variables
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env

      - name: Deploy to Staging
        run: |
          source venv/bin/activate

          echo "Stopping previous Flask application..."
          pkill -f "python app.py" || true

          echo "Starting Flask application..."
          nohup python app.py > output.log 2>&1 < /dev/null &

          sleep 10

          echo "Checking running process..."
          ps -ef | grep app.py || true

          echo "Checking listening port..."
          ss -tulnp | grep 5000 || true

          echo "Application Log"
          cat output.log

  deploy-production:

    needs: build-test

    if: startsWith(github.ref, 'refs/tags/')

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create Virtual Environment
        run: |
          python3 -m venv venv

      - name: Install Dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Configure Environment Variables
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env

      - name: Deploy to Production
        run: |
          source venv/bin/activate

          echo "Stopping previous Flask application..."
          pkill -f "python app.py" || true

          echo "Starting Flask application..."
          nohup python app.py > output.log 2>&1 < /dev/null &

          sleep 10

          echo "Checking running process..."
          ps -ef | grep app.py || true

          echo "Checking listening port..."
          ss -tulnp | grep 5000 || true

          echo "Application Log"
          cat output.log

  notification:

    needs:
      - build-test
      - deploy-staging
      - deploy-production

    if: always()

    runs-on: ubuntu-latest

    steps:

      - name: Pipeline Status
        run: |
          echo "=================================="
          echo "Flask CI/CD Pipeline Completed"
          echo "Repository : ${{ github.repository }}"
          echo "Branch     : ${{ github.ref_name }}"
          echo "Actor      : ${{ github.actor }}"
          echo "Workflow   : ${{ github.workflow }}"
          echo "=================================="
