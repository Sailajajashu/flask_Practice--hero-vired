name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging

  release:
    types:
      - published

jobs:

  build-test:

    runs-on: self-hosted

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create Python Virtual Environment
        run: |
          python3 -m venv venv

      - name: Install Dependencies
        run: |
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Create .env File
        run: |
          cat > .env << EOF
          MONGO_URI=${MONGO_URI}
          SECRET_KEY=${SECRET_KEY}
          EOF

      - name: Verify Environment
        run: |
          echo "Current Directory:"
          pwd

          echo "Files:"
          ls -la

          echo "Checking .env"
          cat .env

          echo "Checking if MONGO_URI exists"

          if [ -z "$MONGO_URI" ]; then
            echo "MONGO_URI NOT FOUND"
            exit 1
          else
            echo "MONGO_URI FOUND"
          fi

      - name: Run Tests
        run: |
          source venv/bin/activate
          pytest -v

      - name: Build
        run: |
          echo "Build completed successfully."

  deploy-staging:

    needs: build-test

    if: github.ref == 'refs/heads/staging'

    runs-on: self-hosted

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create Virtual Environment
        run: |
          python3 -m venv venv

      - name: Install Dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          MONGO_URI=${MONGO_URI}
          SECRET_KEY=${SECRET_KEY}
          EOF

      - name: Deploy Application
        run: |
          source venv/bin/activate

          echo "Stopping previous application..."

          pkill -f "python app.py" || true

          sleep 2

          echo "Starting Flask application..."

          nohup python app.py > output.log 2>&1 < /dev/null &

          sleep 5

          ps -ef | grep app.py || true

          ss -tulnp | grep 5000 || true

          cat output.log

  deploy-production:

    needs: build-test

    if: startsWith(github.ref, 'refs/tags/')

    runs-on: self-hosted

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create Virtual Environment
        run: |
          python3 -m venv venv

      - name: Install Dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          MONGO_URI=${MONGO_URI}
          SECRET_KEY=${SECRET_KEY}
          EOF

      - name: Deploy Application
        run: |
          source venv/bin/activate

          pkill -f "python app.py" || true

          sleep 2

          nohup python app.py > output.log 2>&1 < /dev/null &

          sleep 5

          ps -ef | grep app.py || true

          ss -tulnp | grep 5000 || true

          cat output.log
