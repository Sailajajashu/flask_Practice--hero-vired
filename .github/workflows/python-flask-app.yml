name: Flask CI/CD

on:
  push:
    branches:
      - main

jobs:

  flask-pipeline:

    runs-on: self-hosted

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Create .env
        run: |
          echo "MONGO_URI=$MONGO_URI" > .env
          echo "SECRET_KEY=$SECRET_KEY" >> .env

      - name: Test
        run: |
          source venv/bin/activate
          pytest

      - name: Deploy
        run: |
          source venv/bin/activate

          echo "Stopping existing app..."
          pkill -f "python app.py" || true

          sleep 2

          echo "Starting Flask app..."
          nohup python app.py > output.log 2>&1 < /dev/null &

          sleep 5

          echo "Processes:"
          ps -ef | grep app.py || true

          echo "Port:"
          ss -tulnp | grep 5000 || true

          echo "Logs:"
          cat output.log

      - name: Verify
        run: |
          curl http://localhost:5000 || true
